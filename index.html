<style>
  *{box-sizing:border-box;}
  html{background:#07070A;scroll-behavior:smooth;overflow-x:hidden;}
  body{font-family:'Inter',sans-serif;background:#07070A;margin:0;overflow-x:hidden;user-select:none;}
  ::selection{background:#FF2E88;color:#fff;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-track{background:#07070A;}
  ::-webkit-scrollbar-thumb{background:#191924;border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:#FF2E88;box-shadow:0 0 10px #FF2E88;}
  .glow-pink{text-shadow:0 0 10px rgba(255,46,136,.6),0 0 20px rgba(255,46,136,.4);}
  .glow-gold{text-shadow:0 0 10px rgba(255,199,44,.6),0 0 20px rgba(255,199,44,.4);}
  .page-enter{animation:pgIn .4s ease both;}
  @keyframes pgIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
  /* Global readable defaults */
  p{font-family:'Inter',sans-serif;font-size:15px;line-height:1.7;}
  h1,h2,h3,h4{font-family:'Syne',sans-serif;line-height:1.15;}
  button,input,select,textarea{font-family:'Inter',sans-serif;}
  input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.3);}
  /* Clamp oversized clamp values on tiny screens */
  @media(max-width:400px){
    *{letter-spacing:normal!important;word-break:break-word;}
  }
  #ag-cursor{position:fixed;width:18px;height:18px;border-radius:50%;background:rgba(255,46,136,.65);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 22px rgba(255,46,136,.8);mix-blend-mode:screen;transition:width .15s,height .15s;}
  @media(max-width:768px){#ag-cursor{display:none;}}
  input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1) opacity(.5);}
  select option{background:#121217;color:#fff;}
  .neon-dot{animation:ndot 2s ease-in-out infinite;}
  @keyframes ndot{0%,100%{box-shadow:0 0 6px currentColor;}50%{box-shadow:0 0 18px currentColor;}}
  .strip-scroll{animation:sscroll 36s linear infinite;}
  @keyframes sscroll{to{transform:translateX(-50%);}}
</style>
</head>
<body>
<div id="ag-cursor"></div>
<div id="root"></div>
<script>
  const cur = document.getElementById('ag-cursor');
  let mx=-200,my=-200,cx=-200,cy=-200;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function tick(){cx+=(mx-cx)*.12;cy+=(my-cy)*.12;cur.style.left=cx+'px';cur.style.top=cy+'px';requestAnimationFrame(tick);})();
</script>
