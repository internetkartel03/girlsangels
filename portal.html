<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>Member Portal | Angel Girls</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #07070A; min-height: 100vh; }
  body { font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
  ::selection { background: #FF2E88; color: #fff; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: #07070A; }
  ::-webkit-scrollbar-thumb { background: #1a1a25; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #FF2E88; }
  input, textarea, select { color: white; font-family: 'Inter', sans-serif; }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
  select option { background: #0E0E14; color: white; }
  button { font-family: 'Inter', sans-serif; }
  /* remove blue autofill bg */
  input:-webkit-autofill,
  input:-webkit-autofill:hover,
  input:-webkit-autofill:focus {
    -webkit-text-fill-color: white;
    -webkit-box-shadow: 0 0 0 1000px #141420 inset;
    transition: background-color 5000s ease-in-out 0s;
  }
</style>
</head>
<body>
<div id="portal-root"></div>

<!-- Data layer (vanilla JS — must load before Babel components) -->
<script src="portal/data.js"></script>

<!-- React components (Babel) — order matters: Shared first -->
<script type="text/babel" src="portal/Shared.jsx"></script>
<script type="text/babel" src="portal/Auth.jsx"></script>
<script type="text/babel" src="portal/GirlDashboard.jsx"></script>
<script type="text/babel" src="portal/AdminDashboard.jsx"></script>
<script type="text/babel" src="portal/PortalApp.jsx"></script>
</body>
</html>
